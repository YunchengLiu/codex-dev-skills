name: validate

on:
  push:
  pull_request:

jobs:
  repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install markdownlint-cli2
        run: npm install --global markdownlint-cli2

      - name: Lint Markdown
        run: markdownlint-cli2 "skills/**/*.md"
