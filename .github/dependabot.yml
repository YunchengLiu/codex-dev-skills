version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "cron"
      cronjob: "0 3 1 1,3,5,7,9,11 *"
      timezone: "Asia/Shanghai"
    groups:
      actions-updates:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps): "
