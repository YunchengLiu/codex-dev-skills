interface:
  display_name: "Plan Progress Tracker"
  short_description: "Create and maintain a durable on-disk handoff workpack (overview + module specs + plan/status/decisions) for multi-agent progress tracking"
  default_prompt: "Use $plan-progress-tracker to create or update a durable on-disk handoff workpack (a linked folder of docs) for multi-session, multi-agent work. Treat the user-provided path as `workpack_root`: if it contains `INDEX.md`, update docs in place (create missing MVW docs as stubs if needed); if it is empty/non-existent, initialize a new workpack there; if it is non-empty but missing `INDEX.md`, stop and ask the user to provide the correct workpack root (the folder with `INDEX.md`) or to choose a different empty folder (or subfolder name) for init (do not adopt in place). Use thin/stub modules by default and expand only when interfaces/behavior are real or required. Keep STATUS as a session snapshot (not a second plan), and end with a short handoff summary pointing to `INDEX.md` and `STATUS.md`."

policy:
  allow_implicit_invocation: false
