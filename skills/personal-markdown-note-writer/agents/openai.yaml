interface:
  display_name: "Personal Markdown Note Writer / 个人笔记整理"
  short_description: "把讨论、草稿和摘录整理成自然、独立、长期可用的中文 Markdown 笔记"
  default_prompt: "Use $personal-markdown-note-writer to turn the provided material into a long-lived Chinese Markdown note that reads like a personal note, not a chat summary, spec, or filled-out checklist. Ask for an output file path if missing and write to that file only. Choose learning-note vs tool-note, but keep the structure flexible: keep only the sections that help this note read naturally. Use synthesis mode by default when prior discussion/corrections exist: write the agreed conclusions first and do not introduce new technical conclusions/decisions beyond the source material; put potential corrections under 待确认 or ask. Keep the tone neutral, standalone, and impersonal by default (avoid “我…/你…”, avoid lecture/script tone). If the content mixes distinct intents, separate them as top-level sections in one Markdown file unless the user explicitly asks for multiple files. When internet is available, do an aggressive web sweep for correctness, standard terminology, and examples (prefer official/primary sources for factual claims). Rewrite explanatory prose in your own words; verbatim copy only for reproducibility literals (commands/config/flags/error text/version IDs); any prose quotes must be short (<= 25 words per source), clearly marked, attributed, and cited. If you used web scan, include 2–5 links under 参考 (each with a one-line “用于：…” note). Revise once with the quality checklist before final output."
