interface:
  display_name: "Personal Markdown Note Writer / 个人笔记整理"
  short_description: "把讨论、草稿和摘录整理成自然、独立、长期可用的中文 Markdown 笔记"
  default_prompt: "Use $personal-markdown-note-writer to turn the provided material into a long-lived Chinese Markdown personal knowledge note. Ask for an explicit output file path if missing (or confirm chat-only output) and write only to that path. Default to synthesis mode when prior discussion exists; otherwise write an open-ended learning/tool note based on the user's material."
